name: Post German Quiz

on:
  # Hourly schedule DISABLED: YouTube's Quiz composer does not reliably open
  # under Steel.dev's non-proxied (datacenter IP) browser sessions — Google
  # appears to serve a reduced-functionality experience to that IP class, and
  # the Steel.dev proxy tier that would fix this is not available on the
  # current plan (confirmed via a 403 from the Steel.dev API when requesting
  # useProxy=true). Re-enable the schedule block below only after upgrading
  # to a Steel.dev plan with proxy access.
  # schedule:
  #   - cron: '13 * * * *'
  workflow_dispatch:        # manual trigger only, for testing

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Post vocab + grammar quiz questions
        env:
          STEEL_API_KEY:          ${{ secrets.STEEL_API_KEY }}
          STEEL_SESSION_CONTEXT:  ${{ secrets.STEEL_SESSION_CONTEXT }}
          YOUTUBE_CHANNEL_ID:     ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: python scripts/post_daily.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "chore: update posted state [skip ci]"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Olorunnisola01/learngermandailypost.git"
